<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw Cost Dashboard</title>
  <style>
    :root{--bg:#0b1020;--line:#2b3a69;--text:#eef3ff;--muted:#b0bee9;--accent:#75adff;--accent2:#9585ff;--ok:#2ecc71;--warn:#ffb347;--danger:#ff6b6b}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,system-ui,-apple-system,sans-serif;background:radial-gradient(900px 440px at 12% -8%,#2a3d8242,transparent),var(--bg);color:var(--text)}
    .wrap{max-width:1120px;margin:20px auto;padding:0 14px}
    .top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}
    h1{margin:0;font-size:24px;letter-spacing:.2px}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    label{color:var(--muted);font-size:13px}
    select{background:#101a38;border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px}
    .badge{font-size:12px;padding:7px 10px;border-radius:999px;background:#1b2752;border:1px solid var(--line);color:var(--muted)}

    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
    .card{background:linear-gradient(180deg,#17244b,#121b35);border:1px solid var(--line);border-radius:14px;padding:14px}
    .kpi{grid-column:span 3}.chart{grid-column:span 12}.table{grid-column:span 12}
    .label{font-size:12px;color:var(--muted)}
    .value{margin-top:6px;font-size:30px;font-weight:700;line-height:1.1}
    .sub{margin-top:6px;font-size:12px;color:var(--muted)}
    .status-ok{color:var(--ok)} .status-warn{color:var(--warn)} .status-danger{color:var(--danger)}

    canvas{width:100%;height:250px;background:#101833;border:1px solid #2a3a6d;border-radius:10px}

    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px 8px;border-bottom:1px dashed #2a3a6d;text-align:right}
    th:first-child,td:first-child{text-align:left}
    th{color:var(--muted);font-weight:600}

    @media (max-width:980px){.kpi{grid-column:span 6}}
    @media (max-width:640px){
      .kpi,.chart,.table{grid-column:span 12}
      h1{font-size:20px}
      .value{font-size:26px}
      table{font-size:13px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>OpenClaw Cost Dashboard</h1>
      <div class="controls">
        <label for="modelFilter">Model</label>
        <select id="modelFilter"></select>
        <div class="badge" id="updated">Loading...</div>
      </div>
    </div>

    <div class="grid">
      <div class="card kpi">
        <div class="label">All-Time Total</div>
        <div class="value" id="costAll">$0.0000</div>
        <div class="sub">from available OpenClaw logs</div>
      </div>
      <div class="card kpi">
        <div class="label">Last 7 Days</div>
        <div class="value" id="cost7d">$0.0000</div>
        <div class="sub">rolling window</div>
      </div>
      <div class="card kpi">
        <div class="label">Last 24 Hours</div>
        <div class="value" id="cost24">$0.0000</div>
        <div class="sub" id="range">-</div>
      </div>
      <div class="card kpi">
        <div class="label">Billed Messages (24h)</div>
        <div class="value" id="msgs">0</div>
        <div class="sub" id="statusLine">-</div>
      </div>

      <div class="card chart">
        <div class="label" id="chartTitle" style="margin-bottom:8px">24h Trend (All Models)</div>
        <canvas id="trend" width="1000" height="260"></canvas>
      </div>

      <div class="card table">
        <div class="label" style="margin-bottom:8px">Models (sorted by All-Time, 7D, 24H)</div>
        <div style="overflow:auto">
          <table>
            <thead>
              <tr><th>Model</th><th>All-Time</th><th>7 Days</th><th>24 Hours</th></tr>
            </thead>
            <tbody id="modelsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
let dataCache=null;
const fmtMoney=v=>`$${Number(v||0).toFixed(4)}`;
const fmtTime=s=>new Date(s).toLocaleString('en-US',{hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});

function fillFilter(models){
  const sel=document.getElementById('modelFilter');
  const prev=sel.value||'ALL';
  sel.innerHTML=['<option value="ALL">All models</option>',...(models||[]).map(m=>`<option value="${m}">${m}</option>`)].join('');
  if([...(models||[]),'ALL'].includes(prev)) sel.value=prev;
}

function getSeries(d,model){
  const rows=(d.hourly||[]).slice(-24);
  if(model==='ALL') return rows.map(x=>Number(x.cost||0));
  return rows.map(x=>Number((x.byModel||{})[model]||0));
}

function drawTrend(d,model){
  const rows=(d.hourly||[]).slice(-24);
  const pointsData=getSeries(d,model);
  const c=document.getElementById('trend');
  const dpr=Math.max(window.devicePixelRatio||1,1);
  const cssW=c.clientWidth || 1000;
  const cssH=260;
  c.width=Math.floor(cssW*dpr);
  c.height=Math.floor(cssH*dpr);
  const ctx=c.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);

  const w=cssW,h=cssH,p={l:78,r:20,t:18,b:46};
  ctx.clearRect(0,0,w,h);
  const max=Math.max(...pointsData,0.0001);

  // Y grid + labels (bigger font for mobile clarity)
  ctx.strokeStyle='rgba(255,255,255,.10)';ctx.lineWidth=1;
  ctx.fillStyle='rgba(225,236,255,.88)';ctx.font='13px Inter, sans-serif';
  for(let i=0;i<=4;i++){
    const y=p.t+(h-p.t-p.b)*(i/4);
    ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(w-p.r,y);ctx.stroke();
    ctx.fillText(`$${(max*(1-i/4)).toFixed(2)}`,10,y+4);
  }

  // X axis
  ctx.beginPath();ctx.moveTo(p.l,h-p.b);ctx.lineTo(w-p.r,h-p.b);ctx.strokeStyle='rgba(255,255,255,.2)';ctx.stroke();

  const step=(w-p.l-p.r)/Math.max(pointsData.length-1,1);
  const pts=pointsData.map((v,i)=>({x:p.l+i*step,y:p.t+(1-v/max)*(h-p.t-p.b)}));

  const grad=ctx.createLinearGradient(0,p.t,0,h-p.b);
  grad.addColorStop(0,'rgba(117,173,255,.35)');grad.addColorStop(1,'rgba(117,173,255,.03)');
  ctx.beginPath();pts.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y));
  ctx.lineTo(pts.at(-1)?.x||p.l,h-p.b);ctx.lineTo(pts[0]?.x||p.l,h-p.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();pts.forEach((pt,i)=>i?ctx.lineTo(pt.x,pt.y):ctx.moveTo(pt.x,pt.y));
  ctx.strokeStyle='#8bbcff';ctx.lineWidth=2.4;ctx.stroke();

  // X labels: fixed 24h window with clear units
  ctx.fillStyle='rgba(225,236,255,.9)';ctx.font='12px Inter, sans-serif';
  const marks=[{i:0,t:'24h ago'},{i:Math.floor((rows.length-1)/2),t:'12h ago'},{i:rows.length-1,t:'now'}];
  marks.forEach(m=>{
    if(m.i<0) return;
    const x=p.l+m.i*step;
    ctx.fillText(m.t,x-22,h-14);
  });
}

function updateKPIs(model){
  const stats=(dataCache.modelStats||[]);
  const all={cost24h:dataCache.totalCost24h||0,cost7d:dataCache.totalCost7d||0,costAll:dataCache.totalCostAll||0,messages24h:dataCache.messageCount||0};
  const s=model==='ALL'?all:(stats.find(x=>x.name===model)||{cost24h:0,cost7d:0,costAll:0,messages24h:0});

  document.getElementById('cost24').textContent=fmtMoney(s.cost24h);
  document.getElementById('cost7d').textContent=fmtMoney(s.cost7d);
  document.getElementById('costAll').textContent=fmtMoney(s.costAll);
  document.getElementById('msgs').textContent=String(s.messages24h||0);

  const c24=Number(s.cost24h||0), status=document.getElementById('statusLine');
  status.className='sub ' + (c24>50?'status-danger':c24>20?'status-warn':'status-ok');
  status.textContent = c24>50?'High spend in last 24h':c24>20?'Spend is rising':'Spend is normal';

  document.getElementById('chartTitle').textContent = model==='ALL' ? '24h Trend (All Models)' : `24h Trend (${model})`;
  drawTrend(dataCache,model);
}

function renderTable(){
  const rows=(dataCache.modelStats||[]);
  const body=document.getElementById('modelsTable');
  body.innerHTML = rows.map(r=>`<tr><td>${r.name}</td><td>${fmtMoney(r.costAll)}</td><td>${fmtMoney(r.cost7d)}</td><td>${fmtMoney(r.cost24h)}</td></tr>`).join('') || '<tr><td colspan="4">No data</td></tr>';
}

const DATA_URL='https://gist.githubusercontent.com/goodrambo/a2453d85d2aabc179aa2241997db52b0/raw/latest.json';

async function load(){
  const r=await fetch(DATA_URL+'?_='+Date.now(), {cache:'no-store'});
  if(!r.ok) throw new Error('Cannot load data source');
  dataCache=await r.json();

  document.getElementById('updated').textContent='Updated: '+fmtTime(dataCache.generatedAt);
  document.getElementById('range').textContent=`Range: ${fmtTime(dataCache.range.start)} → ${fmtTime(dataCache.range.end)}`;
  fillFilter(dataCache.models||[]);
  renderTable();
  updateKPIs(document.getElementById('modelFilter').value||'ALL');
}

document.getElementById('modelFilter').addEventListener('change',e=>updateKPIs(e.target.value));
load().catch(e=>{document.getElementById('updated').textContent='Load failed: '+e.message});
setInterval(()=>load().catch(()=>{}), 60000);
</script>
</body>
</html>
